<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings</title>
</head>

<body
    style="background-color: palevioletred; display: flex; align-items: center; justify-content: center;margin: 0; padding: 0;min-height: 100vh;">
    <div
        style="background: rgba(255, 255, 255, 0.15); border: 2px solid red; border-radius: 12px; padding: 2em; max-width: 400px; width: 100%; text-align: center; ">

        <h1 style="color: aliceblue; font-size: 2rem;"> Welcome</h1>
        <p style="font-size: large;margin-bottom: 10px; color:rgba(255, 255, 255, 0.9);">Please enter your name
            to receive a greeting.</p>

        <form action="/greet" method="post">
            <input type="text" placeholder="Enter your name" id="name" name="name"
                style="width: 90%; padding: 10px 14px; border-radius: 8px; border: 1px solid pink; font-size: 1rem;"><br>
            <button type="submit"
                style="width: 30%; padding: 10px; margin-top: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">Get
                Greeting</button>
        </form>
    </div>
</body>

</html>
